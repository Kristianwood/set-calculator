<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Billing Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f4;
    --bg3: #f0efed;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9d9d99;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --green-bg: #E1F5EE; --green-text: #0F6E56; --green-border: rgba(15,110,86,0.3);
    --warn-bg: #FAEEDA;  --warn-text: #854F0B;  --warn-border: rgba(133,79,11,0.3);
    --success-bg: #E1F5EE; --success-text: #0F6E56; --success-border: rgba(15,110,86,0.3);
    --radius: 12px; --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0efe9; --text2: #a0a09b; --text3: #6b6b67;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green-bg: #04342C; --green-text: #5DCAA5; --green-border: rgba(93,202,165,0.3);
      --warn-bg: #412402;  --warn-text: #FAC775;  --warn-border: rgba(250,199,117,0.3);
      --success-bg: #04342C; --success-text: #5DCAA5; --success-border: rgba(93,202,165,0.3);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .app { max-width: 600px; margin: 0 auto; }

  .header { margin-bottom: 28px; }
  .header h1 { font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .header p  { font-size: 14px; color: var(--text2); margin-top: 5px; }

  .section { margin-bottom: 12px; }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
    color: var(--text3); text-transform: uppercase; margin-bottom: 8px; padding: 0 2px;
  }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .row2:last-child { margin-bottom: 0; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 13px; color: var(--text2); font-weight: 500; }
  .field-note { font-size: 11px; color: var(--text3); margin-top: 1px; line-height: 1.4; }

  input[type="time"], input[type="number"] {
    width: 100%;
    padding: 9px 11px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input[type="time"]:focus, input[type="number"]:focus {
    border-color: var(--border2);
  }

  .divider { height: 0.5px; background: var(--border); margin: 16px 0; }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding-top: 14px; border-top: 0.5px solid var(--border); margin-top: 14px;
  }
  .tgl-text .tl { font-size: 14px; color: var(--text); }
  .tgl-text .ts { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .track {
    position: absolute; inset: 0;
    background: var(--border2); border-radius: 22px; cursor: pointer;
    transition: background 0.2s;
  }
  .toggle input:checked + .track { background: #1D9E75; }
  .track:before {
    content: ''; position: absolute;
    width: 16px; height: 16px; left: 3px; top: 3px;
    background: white; border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked + .track:before { transform: translateX(18px); }

  .calc-btn {
    width: 100%; padding: 13px;
    background: var(--text); color: var(--bg);
    border: none; border-radius: var(--radius-sm);
    font-size: 16px; font-weight: 600; font-family: inherit;
    cursor: pointer; margin: 16px 0 0;
    transition: opacity 0.15s;
    letter-spacing: -0.01em;
  }
  .calc-btn:hover { opacity: 0.82; }
  .calc-btn:active { opacity: 0.7; }

  .results { display: none; margin-top: 28px; }
  .results.show { display: block; }

  .res-title {
    font-size: 20px; font-weight: 600; color: var(--text);
    margin-bottom: 16px; letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 10px;
  }

  .on-badge {
    font-size: 11px; padding: 3px 9px; border-radius: 20px;
    background: var(--bg2); color: var(--text2);
    border: 0.5px solid var(--border); font-weight: 500;
  }

  .alert {
    display: flex; gap: 10px; padding: 12px 14px;
    border-radius: var(--radius-sm); margin-bottom: 10px; border: 0.5px solid;
  }
  .alert-warn { background: var(--warn-bg); border-color: var(--warn-border); }
  .alert-ok   { background: var(--success-bg); border-color: var(--success-border); }
  .alert-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .dot-warn { background: #EF9F27; }
  .dot-ok   { background: #1D9E75; }
  .alert-msg { font-size: 13px; line-height: 1.55; }
  .alert-warn .alert-msg { color: var(--warn-text); }
  .alert-ok   .alert-msg { color: var(--success-text); }

  .metrics {
    display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px; margin-bottom: 16px;
  }
  .metric { background: var(--bg2); border-radius: var(--radius-sm); padding: 13px 14px; }
  .m-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .m-val   { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; letter-spacing: -0.02em; }
  .m-sub   { font-size: 11px; color: var(--text3); margin-top: 5px; }

  .structure-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px; margin-bottom: 16px;
  }
  .str-seg {
    border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 10px; text-align: center;
  }
  .str-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .str-val   { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .str-val-muted { font-size: 15px; font-weight: 600; color: var(--text3); }
  .str-sub   { font-size: 10px; color: var(--text3); margin-top: 3px; }

  .cam-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .cam-card { border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .cam-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .cam-time  { font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .cam-note  { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .tl-bar { height: 16px; width: 100%; border-radius: 4px; overflow: hidden; display: flex; margin-bottom: 10px; }
  .tl-seg { height: 100%; }
  .tl-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  .tl-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .tl-dot  { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .bd-table {
    width: 100%; border: 0.5px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
  }
  .bd-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
  .bd-row:last-child { border-bottom: none; }
  .bd-head { background: var(--bg2); }
  .bd-name   { flex: 1; font-size: 14px; color: var(--text); }
  .bd-detail { font-size: 13px; color: var(--text2); margin-right: 14px; min-width: 140px; text-align: right; }
  .bd-amt    { font-size: 14px; font-weight: 600; min-width: 72px; text-align: right; color: var(--text); }
  .bd-muted  { color: var(--text3) !important; }

  .badge { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 4px; font-weight: 600; margin-left: 6px; vertical-align: middle; }
  .b-green  { background: #E1F5EE; color: #0F6E56; }
  .b-amber  { background: #FAEEDA; color: #854F0B; }
  .b-orange { background: #FAECE7; color: #993C1D; }
  .b-red    { background: #FCEBEB; color: #A32D2D; }
  .b-warn   { background: var(--warn-bg); color: var(--warn-text); }
  .b-gray   { background: var(--bg2); color: var(--text2); }
  .b-unpaid { background: var(--bg2); color: var(--text3); }

  .total-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg2); border-radius: var(--radius-sm); padding: 16px 18px;
  }
  .total-label { font-size: 14px; color: var(--text2); }
  .total-val   { font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: -0.03em; }

  @media (max-width: 400px) {
    .row2 { grid-template-columns: 1fr 1fr; gap: 10px; }
    .structure-row { grid-template-columns: 1fr 1fr; }
    .metrics { grid-template-columns: 1fr 1fr 1fr; }
    .bd-detail { display: none; }
    body { padding: 16px 12px 60px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Set billing calculator</h1>
    <p>Film / TV — billable hours, overtime &amp; meal penalties</p>
  </div>

  <div class="section">
    <div class="section-label">Times</div>
    <div class="card">
      <div class="row2">
        <div class="field">
          <label>Crew call</label>
          <input type="time" id="crewCall" value="07:30">
        </div>
        <div class="field">
          <label>Your wrap</label>
          <input type="time" id="yourWrap" value="18:30">
          <div class="field-note">Drives your billable hours &amp; OT</div>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Lunch out</label>
          <input type="time" id="lunchOut" value="13:30">
        </div>
        <div class="field">
          <label>Lunch in</label>
          <input type="time" id="lunchIn" value="14:30">
        </div>
      </div>
      <div class="row2" style="margin-bottom:0">
        <div class="field">
          <label>Camera wrap</label>
          <input type="time" id="camWrap" value="18:30">
          <div class="field-note">Used only for meal penalty check</div>
        </div>
        <div class="field"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Rate</div>
    <div class="card">
      <div class="row2" style="margin-bottom:0">
        <div class="field">
          <label>Your hourly rate ($)</label>
          <input type="number" id="rate" value="50" min="0" step="0.01">
        </div>
        <div class="field">
          <label>Meal penalty rate ($/hr)</label>
          <input type="number" id="mpRate" value="50" min="0" step="0.01">
          <div class="field-note">Often matches your hourly rate</div>
        </div>
      </div>
      <div class="toggle-row">
        <div class="tgl-text">
          <div class="tl">Meal penalties</div>
          <div class="ts">Late lunch (6h from call) · Cam wrap past 6h after lunch in</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="mpToggle" checked>
          <span class="track"></span>
        </label>
      </div>
    </div>
  </div>

  <button class="calc-btn" onclick="calculate()">Calculate</button>

  <div class="results" id="results">
    <div class="res-title" id="resTitle">Breakdown</div>
    <div id="alerts"></div>
    <div class="metrics" id="metrics"></div>
    <div class="structure-row" id="structureRow"></div>
    <div class="cam-row" id="camRow"></div>
    <div class="tl-bar" id="tlBar"></div>
    <div class="tl-legend" id="tlLegend"></div>
    <div class="bd-table" id="bdTable"></div>
    <div class="total-bar">
      <span class="total-label">Total due</span>
      <span class="total-val" id="totalDue">$0.00</span>
    </div>
  </div>
</div>

<script>
function toM(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function adjAfter(t,ref) { while(t<=ref) t+=1440; return t; }
function adjSameOrAfter(t,ref) { while(t<ref) t+=1440; return t; }
function fmtT(m) { const n=((m%1440)+1440)%1440; return String(Math.floor(n/60)).padStart(2,'0')+':'+String(n%60).padStart(2,'0'); }
function fmtH(h) {
  if (h<=0) return '0h';
  const wh=Math.floor(h), wm=Math.round((h-wh)*60);
  if (wm===0) return wh+'h';
  if (wh===0) return wm+'m';
  return wh+'h '+wm+'m';
}

function calculate() {
  const call     = toM(document.getElementById('crewCall').value);
  const yourWrap = adjAfter(toM(document.getElementById('yourWrap').value), call);
  const lOut     = adjSameOrAfter(toM(document.getElementById('lunchOut').value), call);
  const lIn      = adjAfter(toM(document.getElementById('lunchIn').value), lOut-1);
  const camWrap  = adjSameOrAfter(toM(document.getElementById('camWrap').value), call);
  const rate     = parseFloat(document.getElementById('rate').value)||0;
  const mpRate   = parseFloat(document.getElementById('mpRate').value)||rate;
  const mpOn     = document.getElementById('mpToggle').checked;
  const overnight = yourWrap >= 1440;

  const lunchH     = (lIn - lOut) / 60;
  const morningH   = (lOut - call) / 60;
  const afternoonH = (yourWrap - lIn) / 60;
  const workedH    = morningH + afternoonH;

  const MORNING_MIN=6, AFTERNOON_MIN=4, DAY_MIN=10;
  const billMorning   = Math.max(MORNING_MIN, morningH);
  const billAfternoon = Math.max(AFTERNOON_MIN, afternoonH);
  const billWorked    = Math.max(DAY_MIN, workedH);

  const otH = Math.max(0, workedH - DAY_MIN);
  const ot1 = Math.min(otH, 2);
  const ot2 = Math.min(Math.max(otH-2,0), 2);
  const ot3 = Math.max(otH-4, 0);

  const alerts = [];
  let mpPay = 0;
  if (mpOn) {
    const lunchDeadline = call + 6*60;
    if (lOut > lunchDeadline) {
      const lateH = (lOut-lunchDeadline)/60;
      alerts.push({ msg:`Late lunch penalty: meal break started ${fmtH(lateH)} after the 6-hour mark (${fmtT(lunchDeadline)}). 2× meal penalty rate applies for the overage.` });
      mpPay += lateH * mpRate * 2;
    }
    const wrapDeadline = lIn + 6*60;
    if (camWrap > wrapDeadline) {
      const lateH = (camWrap-wrapDeadline)/60;
      alerts.push({ msg:`Camera wrap penalty: cam wrapped ${fmtH(lateH)} past 6 hours after lunch in (${fmtT(wrapDeadline)}). 2× meal penalty rate applies.` });
      mpPay += lateH * mpRate * 2;
    }
  }

  const straightPay = DAY_MIN * rate;
  const ot1Pay = ot1*rate*1.5, ot2Pay = ot2*rate*2, ot3Pay = ot3*rate*3;
  const totalPay = straightPay + ot1Pay + ot2Pay + ot3Pay + mpPay;

  document.getElementById('resTitle').innerHTML =
    'Breakdown' + (overnight ? '<span class="on-badge">overnight</span>' : '');

  const alertsEl = document.getElementById('alerts');
  alertsEl.innerHTML = '';
  if (mpOn && alerts.length===0) {
    alertsEl.innerHTML = `<div class="alert alert-ok"><div class="alert-dot dot-ok"></div><div class="alert-msg">No meal penalties — all good.</div></div>`;
  }
  alerts.forEach(a => {
    alertsEl.innerHTML += `<div class="alert alert-warn"><div class="alert-dot dot-warn"></div><div class="alert-msg">${a.msg}</div></div>`;
  });

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="m-label">Hours worked</div><div class="m-val">${fmtH(workedH)}</div><div class="m-sub">${fmtT(call)} – ${fmtT(yourWrap)}${overnight?' (+1)':''}</div></div>
    <div class="metric"><div class="m-label">Billable hours</div><div class="m-val">${fmtH(billWorked)}</div><div class="m-sub">${otH>0?fmtH(otH)+' OT':'Flat day'}</div></div>
    <div class="metric"><div class="m-label">Total pay</div><div class="m-val">$${totalPay.toFixed(0)}</div><div class="m-sub">$${rate.toFixed(2)}/hr base</div></div>`;

  document.getElementById('structureRow').innerHTML = `
    <div class="str-seg"><div class="str-label">Morning</div><div class="str-val">${fmtH(billMorning)}</div><div class="str-sub">${billMorning>morningH?'6h min':'actual'}</div></div>
    <div class="str-seg"><div class="str-label">Lunch</div><div class="str-val-muted">${fmtH(lunchH)}</div><div class="str-sub">unpaid</div></div>
    <div class="str-seg"><div class="str-label">Afternoon</div><div class="str-val">${fmtH(billAfternoon)}</div><div class="str-sub">${billAfternoon>afternoonH?'4h min':'actual'}</div></div>
    <div class="str-seg"><div class="str-label">Overtime</div><div class="${otH===0?'str-val-muted':'str-val'}">${otH>0?fmtH(otH):'—'}</div><div class="str-sub">${otH>0?'after 10H':'none'}</div></div>`;

  const diff = yourWrap - camWrap;
  let diffNote = 'Same as your wrap';
  if (diff>0) diffNote = `You wrapped ${fmtH(diff/60)} after cam`;
  if (diff<0) diffNote = `Cam wrapped ${fmtH(Math.abs(diff)/60)} after you`;
  document.getElementById('camRow').innerHTML = `
    <div class="cam-card"><div class="cam-label">Camera wrap</div><div class="cam-time">${fmtT(camWrap)}</div><div class="cam-note">Meal penalty trigger</div></div>
    <div class="cam-card"><div class="cam-label">Your wrap</div><div class="cam-time">${fmtT(yourWrap)}${overnight?' <span style="font-size:13px;color:var(--text3)">(+1)</span>':''}</div><div class="cam-note">${diffNote}</div></div>`;

  const totalSpan = yourWrap - call;
  const segs = [
    { label:'Morning',   mins: lOut-call,   color:'#1D9E75' },
    { label:'Lunch',     mins: lIn-lOut,    color:'#D3D1C7' },
    { label:'Afternoon', mins: Math.min(yourWrap-lIn, AFTERNOON_MIN*60), color:'#378ADD' },
  ];
  if (ot1>0) segs.push({ label:'OT 1.5×', mins:ot1*60, color:'#EF9F27' });
  if (ot2>0) segs.push({ label:'OT 2×',   mins:ot2*60, color:'#D85A30' });
  if (ot3>0) segs.push({ label:'OT 3×',   mins:ot3*60, color:'#E24B4A' });

  document.getElementById('tlBar').innerHTML = segs.map(s=>`<div class="tl-seg" style="width:${Math.max(0,(s.mins/totalSpan)*100).toFixed(1)}%;background:${s.color}"></div>`).join('');
  document.getElementById('tlLegend').innerHTML = segs.filter(s=>s.mins>0).map(s=>`<div class="tl-item"><div class="tl-dot" style="background:${s.color}"></div>${s.label} (${fmtH(s.mins/60)})</div>`).join('');

  let rows = `<div class="bd-row bd-head"><span class="bd-name" style="font-size:13px;color:var(--text2)">Period</span><span class="bd-detail" style="font-size:13px;color:var(--text2)">Calculation</span><span class="bd-amt" style="font-size:13px;color:var(--text2)">Amount</span></div>`;
  rows += `<div class="bd-row"><span class="bd-name">Morning <span class="badge b-green">1×</span>${billMorning>morningH?'<span class="badge b-gray">6h min</span>':''}</span><span class="bd-detail">${fmtH(billMorning)} × $${rate.toFixed(2)}</span><span class="bd-amt">$${(billMorning*rate).toFixed(2)}</span></div>`;
  rows += `<div class="bd-row"><span class="bd-name bd-muted">Lunch <span class="badge b-unpaid">unpaid</span></span><span class="bd-detail bd-muted">${fmtH(lunchH)} — not billed</span><span class="bd-amt bd-muted">—</span></div>`;
  rows += `<div class="bd-row"><span class="bd-name">Afternoon <span class="badge b-green">1×</span>${billAfternoon>afternoonH?'<span class="badge b-gray">4h min</span>':''}</span><span class="bd-detail">${fmtH(billAfternoon)} × $${rate.toFixed(2)}</span><span class="bd-amt">$${(billAfternoon*rate).toFixed(2)}</span></div>`;
  if (ot1>0) rows += `<div class="bd-row"><span class="bd-name">OT hrs 1–2 <span class="badge b-amber">1.5×</span></span><span class="bd-detail">${fmtH(ot1)} × $${(rate*1.5).toFixed(2)}</span><span class="bd-amt">$${ot1Pay.toFixed(2)}</span></div>`;
  if (ot2>0) rows += `<div class="bd-row"><span class="bd-name">OT hrs 3–4 <span class="badge b-orange">2×</span></span><span class="bd-detail">${fmtH(ot2)} × $${(rate*2).toFixed(2)}</span><span class="bd-amt">$${ot2Pay.toFixed(2)}</span></div>`;
  if (ot3>0) rows += `<div class="bd-row"><span class="bd-name">OT hr 5+ <span class="badge b-red">3×</span></span><span class="bd-detail">${fmtH(ot3)} × $${(rate*3).toFixed(2)}</span><span class="bd-amt">$${ot3Pay.toFixed(2)}</span></div>`;
  if (mpPay>0) rows += `<div class="bd-row"><span class="bd-name" style="color:var(--warn-text)">Meal penalty <span class="badge b-warn">2×</span></span><span class="bd-detail" style="color:var(--warn-text)">Overage × $${(mpRate*2).toFixed(2)}/hr</span><span class="bd-amt" style="color:var(--warn-text)">$${mpPay.toFixed(2)}</span></div>`;

  document.getElementById('bdTable').innerHTML = rows;
  document.getElementById('totalDue').textContent = '$' + totalPay.toFixed(2);
  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
